services:
  funnel:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./runs:/app/runs
      # Persist the market-data parquet cache AND the threshold-independent
      # compute cache across container rebuilds. The backtest window is a
      # fixed range, so data is downloaded once ever per range — this keeps
      # warm re-runs at ~3s after rebuilds and sidesteps Yahoo's
      # adjusted-price jitter (re-downloads return values differing at
      # float32 precision, which legitimately invalidates the cache).
      - ./data:/app/data
    environment:
      FUNNEL_RUNS_DIR: /app/runs
    # yfinance bootstraps its auth cookie from fc.yahoo.com, which is on
    # common DNS-blocklist feeds (resolves to 0.0.0.0 on ad-blocking
    # resolvers), making every data fetch return empty. The durable fix is
    # whitelisting fc.yahoo.com in your DNS blocker; as a stopgap, uncomment
    # the pin below (IP from `dig +short fc.yahoo.com @1.1.1.1` — re-check
    # it if fetches break again, Yahoo rotates IPs).
    extra_hosts:
      - "fc.yahoo.com:69.147.88.7"
